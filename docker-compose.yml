version: '3.8'

services:
  api:
    build: 
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: pricescout_api
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    environment:
      - REDIS_URL=redis://redis:6379/0
      - FASTAPI_ENV=development
      - PYTHONPATH=/app
    env_file:
      - ./apps/web/.env.local
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    build: 
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: pricescout_worker
    volumes:
      - ./apps/api:/app
    environment:
      - REDIS_URL=redis://redis:6379/0
      - FASTAPI_ENV=development
      - PYTHONPATH=/app
    env_file:
      - ./apps/web/.env.local
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A tasks.celery_app worker --loglevel=info
    healthcheck:
      test: ["CMD", "celery", "-A", "tasks.celery_app", "status"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: pricescout_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  redis_data:
