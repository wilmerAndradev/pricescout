[tool.ruff]
# Excluir scripts de debug/scratch del linting de CI
exclude = [
    "scratch_*.py",
    "run_local.py",
    "temp_web_scraper/",
    "__pycache__/",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",  # line too long (manejado en revisión de código)
    "E402",  # imports no al top: intencional en conftest.py (mocks antes de imports) y otros módulos
    "E712",  # == True/False: aceptable en asserts de pytest para legibilidad
]
