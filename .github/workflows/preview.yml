name: Preview Deployment

on:
  pull_request:
    branches:
      - main

env:
  VERCEL_ORG_ID: team_4zNlTrLDYS8Zz4v7OdVHGBTl
  VERCEL_PROJECT_ID: prj_syIXQSulWzMeKiKcX9mSdsjY5Oo8

jobs:
  preview:
    name: Deploy → Vercel (Preview)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy preview and capture URL
        id: deploy
        working-directory: apps/web
        run: |
          PREVIEW_URL=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
            const body = [
              '## 🚀 Preview Deployment Ready',
              '',
              `| | |`,
              `|---|---|`,
              `| **Preview URL** | [${previewUrl}](${previewUrl}) |`,
              `| **Commit** | \`${{ github.sha }}\` |`,
              `| **Branch** | \`${{ github.head_ref }}\` |`,
              '',
              '_This preview will be automatically updated on every new commit to this PR._',
            ].join('\n');

            // Buscar comentario previo del bot para actualizarlo en vez de crear uno nuevo
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview Deployment Ready')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
