name: CI/CD Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd apps/web
          npm ci

      - name: Run ESLint (Frontend)
        run: |
          cd apps/web
          npm run lint

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff Check (Backend)
        run: |
          ruff check apps/api

  typecheck:
    name: Type Checking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd apps/web
          npm ci

      - name: Run Typecheck (Frontend)
        run: |
          cd apps/web
          npx tsc --noEmit

  test-unit:
    name: Unit Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd apps/web
          npm ci

      - name: Run Vitest (Frontend)
        run: |
          cd apps/web
          npm run test:unit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f apps/api/requirements.txt ]; then
            pip install -r apps/api/requirements.txt
          fi
          pip install pytest pytest-asyncio

      - name: Run Pytest (Backend)
        run: |
          pytest apps/api/tests -v
        shell: bash

  build:
    name: Build & Packaging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd apps/web
          npm ci

      - name: Build Frontend (Next.js)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder_anon_key' }}
        run: |
          cd apps/web
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend (Docker)
        # El build de Docker es una validación de la imagen, no bloquea el CI
        # si falla (ej: cambios de paquetes del sistema en nuevas versiones de Debian)
        continue-on-error: true
        run: |
          docker build -t pricescout-api:latest ./apps/api

  deploy:
    name: Deploy to Production
    needs: [lint, typecheck, test-unit, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Notify Deploy Handoff
        run: |
          echo "✅ CI pasó. El deploy a producción lo maneja Vercel via deploy.yml"
          echo "Commit: ${{ github.sha }}"
